name: Deploy cudf-java docs
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version being released. Format: YY.MM or YY.MM.P e.g 24.08 or 24.08.1"
        required: true
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
defaults:
  run:
    shell: bash
permissions:
  id-token: write
  contents: write
  pull-requests: write
jobs:
  deploy-cudf-java-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Update cudf-java source data and generated artifacts
        env:
          VERSION: ${{ inputs.version }}
        run: |
          python3 -m venv /tmp/docs-automation
          /tmp/docs-automation/bin/python -m pip install pyyaml ruamel.yaml
          /tmp/docs-automation/bin/python ci/update-docs-project.py \
            --project cudf-java \
            --channel stable \
            --version "${VERSION}"
          /tmp/docs-automation/bin/python ci/generate-projects-to-versions.py
      - uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 #v5.1.1
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-duration-seconds: 7200 # 2h
      - name: Upload cudf-java docs to S3
        env:
          VERSION: ${{ inputs.version }}
        run: ci/upload_cudf_java_docs.sh "${VERSION}"
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Update stable value for cudf-java in docs.yml"
          branch: "update-stable-value-for-cudf-java"
          title: Enable cudf-java docs for version ${{ inputs.version }}
          author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          body: |
            This PR enables cudf-java docs for version ${{ inputs.version }}.
